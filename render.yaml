services:
  - type: web
    name: hpp-canada-inventory
    runtime: python
    buildCommand: pip install -r backend/requirements.txt && cd frontend && npm install && npm run build
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: API_KEY
        value: changeme
      - key: GROQ_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.12"
